services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: savestate
      POSTGRES_USER: savestate
      POSTGRES_PASSWORD: savestate
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savestate"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: savestate
      DB_USER: savestate
      DB_PASSWORD: savestate
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/savestate
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

volumes:
  postgres-data:
